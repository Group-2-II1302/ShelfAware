name: Task / Bug
description: Technical work or bug fix
title: "[Task]: "
labels: ["task"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Task
        - Bug
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps / Details
      placeholder: |
        1. Do this
        2. Then this

  - type: textarea
    id: done
    attributes:
      label: Definition of Done
      placeholder: |
        - [ ] Code works
        - [ ] Tested