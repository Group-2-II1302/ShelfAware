name: Bug
description: Something broken in the system
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: id
    attributes:
      label: Bug ID
      description: e.g. BUG-001
    validations:
      required: true

  - type: input
    id: priority
    attributes:
      label: Priority
      description: P0 / P1 / P2 / P3
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior