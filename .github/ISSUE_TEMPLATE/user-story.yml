name: User Story
description: Product backlog item
title: "[US]: "
labels: ["user-story"]
body:
  - type: input
    id: id
    attributes:
      label: Story ID
      description: Unique identifier (e.g. US-001)
    validations:
      required: true

  - type: input
    id: priority
    attributes:
      label: Priority
      description: P0 (highest), P1, P2, P3
    validations:
      required: true

  - type: input
    id: points
    attributes:
      label: Story Points
      description: Fibonacci scale (1,2,3,5,8,13)
    validations:
      required: true

  - type: textarea
    id: story
    attributes:
      label: User Story
      placeholder: As a ___ I want ___ so that ___
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
    validations:
      required: true