name: User Story
description: Create a user story for the product backlog
title: "[User Story]: "
labels: ["user-story"]
body:
  - type: textarea
    id: story
    attributes:
      label: User Story
      description: Describe the feature from the user's perspective
      placeholder: As a ___, I want ___ so that ___
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true for this to be done?
      placeholder: |
        - [ ] Condition 1
        - [ ] Condition 2
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes / Context
      description: Optional extra details